<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M3 GameBoard Overlay</title>
  <link rel="stylesheet" href="./overlay.css" />
</head>
<body>
  <div class="board" id="board">
    <div class="grid">
      <div class="corner-spacer"></div>
      <div class="header-cell"><div class="icon-wrap"><img id="game1Icon" class="game-icon" alt="Game 1"></div></div>
      <div class="header-cell"><div class="icon-wrap"><img id="game2Icon" class="game-icon" alt="Game 2"></div></div>
      <div class="header-cell"><div class="icon-wrap"><img id="game3Icon" class="game-icon" alt="Game 3"></div></div>

      <div class="player-row top">
        <div class="avatar-shell" id="p1Shell">
          <div class="crown">👑</div>
          <img id="player1Avatar" class="avatar" alt="Player 1">
        </div>
        <div class="player-name" id="player1Name">Marlon</div>
      </div>
      <div class="result-cell empty" id="g1p1">·</div>
      <div class="result-cell empty" id="g2p1">·</div>
      <div class="result-cell empty" id="g3p1">·</div>

      <div class="player-row bottom">
        <div class="avatar-shell" id="p2Shell">
          <div class="crown">👑</div>
          <img id="player2Avatar" class="avatar" alt="Player 2">
        </div>
        <div class="player-name" id="player2Name">Max</div>
      </div>
      <div class="result-cell empty" id="g1p2">·</div>
      <div class="result-cell empty" id="g2p2">·</div>
      <div class="result-cell empty" id="g3p2">·</div>
    </div>

    <div class="winner-banner" id="winnerBanner">
      <img id="winnerPfp" class="winner-pfp" alt="Winner">
      <div class="winner-copy">
        <div class="small">Series Result</div>
        <div class="big" id="winnerText">Marlon Winner</div>
      </div>
    </div>

    <div class="confetti" id="confetti"></div>
  </div>

  <div class="note">Icons-only version · Firebase path: series/</div>
  <script type="module" src="./overlay.js"></script>
</body>
</html>
